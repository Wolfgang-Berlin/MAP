<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Fielmann-Karte</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>

  <script src="filialen.js"></script>

  <style>
    
    html, body {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      overflow: hidden;
      display: flex; flex-direction: column;
      font-family: verdana;
    }
    #header {
      background: midnightblue;
      color: white;
      text-align: center;
    }

    #header h1 { font-size: 0.9rem; }   
    #map { flex-grow: 1; width: 100%; }

    .popup-content { min-width: 180px; font-size: 14px; }
    .btn-container { display: flex; gap: 8px; margin-top: 12px; }
    .btn {
      flex: 1; text-align: center; padding: 6px;
      border-radius: 4px; text-decoration: none;
      font-weight: bold; font-size: 12px; color: white;
    }
    .btn-gmaps { background: white; }
    .btn-pdf { background: white; }
  </style>
</head>
<body>

  <div id="header">
    <h1>Fielmann   Filialfinder</h1>
  </div>
  
  <div id="map"></div>

  <script>
    const map = L.map('map').setView([52.52, 13.4], 10);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    const markerLayer = L.layerGroup().addTo(map);
    const allMarkers = [];


    function createCustomIcon(char, color) {
      return L.divIcon({
        className: '',
        html: `<svg width="28" height="36" 
        viewBox="0 0 28 36"><path d="M14 0C6.27 0 0 6.27 0 14c0 9.33 14 22 14 22S28 23.33 28 14C28 6.27 21.73 0 14 0z" fill="${color || '#003366'}"/>
        <circle cx="14" cy="14" r="8" fill="white"/><text x="14" y="19" text-anchor="middle" font-size="12" font-weight="bold" fill="black">${char}</text></svg>`,
        iconSize: [28, 36], iconAnchor: [14, 36], popupAnchor: [0, -38]
      });
    }

    function init() {
      filialen.forEach(f => {
        const marker = L.marker([f.lat, f.lng], { icon: createCustomIcon(f.char, f.color) });
        
        const pdfFileName = encodeURIComponent(f.name) + ".pdf";
        const pdfPath = `Orte/${pdfFileName}`; 
        const appleMapsUrl = `http://maps.apple.com/?q=${encodeURIComponent(f.name + ' ' + f.addr)}`;
        const nameEsc = f.name.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
        const addrEsc = f.addr.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
        const telEsc  = f.tel.replace(/'/g,"\\'");

        marker.bindPopup(`
          <div style="min-width: 180px;">
            <b style="color: #003366;">${f.name}</b><br>${f.addr}<br><br>
            <a href="tel:${f.tel}" style="text-decoration:none; color:inherit;">📞 ${f.tel}</a>
            <div class="btn-container">
              <a href="${appleMapsUrl}" target="_blank" class="btn btn-gmaps">Karten</a>
              <button onclick="openICS('${nameEsc}','${addrEsc}','${telEsc}')"
                style="flex:1;padding:6px;border-radius:4px;border:none;background:white;color:black;font-weight:bold;font-size:12px;cursor:pointer;">📅 Termin</button>
            </div>
          </div>
`);
        
        marker.searchData = (f.name + " " + f.addr).toLowerCase();
        allMarkers.push(marker);
        marker.addTo(markerLayer);
      });
      
      const group = new L.featureGroup(allMarkers);
      if (allMarkers.length > 0) map.fitBounds(group.getBounds(), { padding: [30, 30] });
    }

    function searchLocation() {
      const query = document.getElementById('searchInput').value.toLowerCase();
      const visible = allMarkers.filter(m => m.searchData.includes(query));
      allMarkers.forEach(m => m.remove());
      visible.forEach(m => m.addTo(markerLayer));
      if (visible.length > 0) map.fitBounds(new L.featureGroup(visible).getBounds(), { padding: [50, 50], maxZoom: 15 });
    }

    function openICS(name, addr, tel) {
      const overlay = document.createElement('div');
      overlay.id = 'calOverlay';
      overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:9999;display:flex;align-items:center;justify-content:center;';
      const tomorrow = new Date(); tomorrow.setDate(tomorrow.getDate()+1);
      const pad = n => String(n).padStart(2,'0');
      const defaultDate = `${tomorrow.getFullYear()}-${pad(tomorrow.getMonth()+1)}-${pad(tomorrow.getDate())}`;
      const nameE = name.replace(/'/g,"\\'");
      const addrE = addr.replace(/'/g,"\\'");
      const telE  = tel.replace(/'/g,"\\'");
      overlay.innerHTML = `
        <div style="background:white;border-radius:12px;padding:20px;width:280px;font-family:verdana;box-shadow:0 4px 20px rgba(0,0,0,0.3);">
          <b style="color:#003366;font-size:14px;">&#128197; Termin eintragen</b>
          <p style="font-size:12px;color:#555;margin:6px 0 14px;">${name}<br><span style="color:#888;">${addr}</span></p>
          <label style="font-size:12px;font-weight:bold;">Datum</label><br>
          <input id="calDate" type="date" value="${defaultDate}" style="width:100%;margin:4px 0 12px;padding:6px;border:1px solid #ccc;border-radius:6px;font-size:14px;box-sizing:border-box;">
          <label style="font-size:12px;font-weight:bold;">Uhrzeit</label><br>
          <input id="calTime" type="time" value="10:00" style="width:100%;margin:4px 0 16px;padding:6px;border:1px solid #ccc;border-radius:6px;font-size:14px;box-sizing:border-box;">
          <div style="display:flex;gap:8px;">
            <button onclick="document.getElementById('calOverlay').remove()" style="flex:1;padding:8px;border-radius:6px;border:1px solid #ccc;background:white;font-size:13px;cursor:pointer;">Abbrechen</button>
            <button onclick="downloadICS('${nameE}','${addrE}','${telE}')" style="flex:1;padding:8px;border-radius:6px;border:none;background:#1a73e8;color:white;font-weight:bold;font-size:13px;cursor:pointer;">Speichern</button>
          </div>
        </div>`;
      document.body.appendChild(overlay);
    }

    function downloadICS(name, addr, tel) {
      const dateVal = document.getElementById('calDate').value;
      const timeVal = document.getElementById('calTime').value;
      if (!dateVal || !timeVal) return;
      const [y,m,d] = dateVal.split('-');
      const [hh,mm] = timeVal.split(':');
      const dtStart = `${y}${m}${d}T${hh}${mm}00`;
      const endH = String(parseInt(hh)+1).padStart(2,'0');
      const dtEnd = `${y}${m}${d}T${endH}${mm}00`;
      const now = new Date().toISOString().replace(/[-:]/g,'').split('.')[0]+'Z';
      const ics = [
        'BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//Fielmann Filialfinder//DE',
        'BEGIN:VEVENT',
        `UID:${now}@fielmann-map`,`DTSTAMP:${now}`,
        `DTSTART:${dtStart}`,`DTEND:${dtEnd}`,
        `SUMMARY:Termin ${name}`,`LOCATION:${addr}`,
        'END:VEVENT','END:VCALENDAR'
      ].join('\r\n');
      // iOS Safari: direkt navigieren statt Download
      window.location.href = 'data:text/calendar;charset=utf-8,' + encodeURIComponent(ics);
      document.getElementById('calOverlay').remove();
    }

    init();
    window.addEventListener('resize', () => map.invalidateSize());
  </script>
</body>
</html>
